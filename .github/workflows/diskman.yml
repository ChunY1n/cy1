name: Build APKs only for NanoPi R4S (diskman + zh-cn + missing kmods)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "ImmortalWrt 源码分支/commit (留空则用 openwrt-25.12 分支最新代码)"
        required: false
        default: "openwrt-25.12"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: ${{ github.event.inputs.branch || 'openwrt-25.12' }}
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force
          df -h

      - name: 安装编译依赖 (Ubuntu 22.04)
        run: |
          sudo apt-get update
          sudo apt-get full-upgrade -y
          sudo apt-get install -y ack antlr3 aria2 asciidoc autoconf automake autopoint \
            binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
            fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool \
            libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs \
            msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-pyelftools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"

      - name: 克隆 ImmortalWrt 源码
        run: |
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" immortalwrt
          echo "BUILD_DIR=$GITHUB_WORKSPACE/immortalwrt" >> "$GITHUB_ENV"

      - name: 更新并安装 feeds
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 写入自定义配置 (.config)
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          cat > .config <<'EOF'
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r4s=y

          # diskman 及中文语言包
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-i18n-diskman-zh-cn=y

          # 官方仓库缺失的依赖，手动编译
          CONFIG_PACKAGE_kmod-fs-msdos=y
          CONFIG_PACKAGE_kmod-nls-cp932=y
          CONFIG_PACKAGE_kmod-nls-cp936=y
          CONFIG_PACKAGE_kmod-nls-cp950=y
          EOF

          make defconfig

      - name: 核对关键配置是否生效
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          grep -E "luci-app-diskman|luci-i18n-diskman|kmod-fs-msdos|kmod-nls-cp9|nanopi-r4s" .config || true

      - name: 下载源码包 (dl)
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          make download -j8

      - name: 编译工具链 + 内核 (kmod 必须依赖这步，无法跳过)
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          make -j$(nproc) tools/install V=s || make -j1 tools/install V=s
          make -j$(nproc) toolchain/install V=s || make -j1 toolchain/install V=s
          make -j$(nproc) target/linux/compile V=s || make -j1 target/linux/compile V=s

      - name: 只编译软件包 (跳过镜像打包，不生成固件)
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          make -j$(nproc) package/compile V=s || make -j1 package/compile V=s
          make -j$(nproc) package/index V=s

      - name: 整理 apk 产物
        run: |
          mkdir -p artifact
          find "$BUILD_DIR/bin" -type f -name "*.apk" \( \
              -name "kmod-fs-msdos_*" -o \
              -name "kmod-nls-cp932_*" -o \
              -name "kmod-nls-cp936_*" -o \
              -name "kmod-nls-cp950_*" -o \
              -name "luci-app-diskman_*" -o \
              -name "luci-i18n-diskman-zh-cn_*" \
            \) -exec cp {} artifact/ \;
          # 如果上面没找到（比如包名版本号变化），打印整个 packages 目录方便排查
          echo "---- 实际找到的 apk ----"
          ls -lh artifact/ || true
          echo "---- 若上面为空，请检查以下完整列表，手动改文件名匹配规则 ----"
          find "$BUILD_DIR/bin" -type f -name "*.apk" | grep -E "diskman|msdos|cp932|cp936|cp950" || true

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: r4s-diskman-apks-${{ github.run_number }}
          path: artifact/
          retention-days: 14
